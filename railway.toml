[build]
builder = "NIXPACKS"
# Requires DATABASE_URL + DATABASE_URL_UNPOOLED (Neon direct) in Railway env for migrate step
buildCommand = "pnpm install --frozen-lockfile && pnpm db:migrate && pnpm build --filter=@repo/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
